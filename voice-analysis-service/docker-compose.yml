# BrainFriends voice-analysis 단독 compose.
# 운영 NCP/AWS VM 에서 단일 서비스로 띄울 때 사용.
# 같은 VM 의 Next.js 가 http://127.0.0.1:8001 로 접근.

services:
  voice-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    image: brainfriends/voice-analysis:latest
    container_name: brainfriends-voice-analysis
    restart: unless-stopped
    ports:
      # 운영에서는 외부 노출이 필요 없으면 "127.0.0.1:8001:8001" 로 좁혀라.
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul
    # 개발 시 hot-reload 가 필요하면 아래 두 줄을 주석 해제하고
    # CMD 를 `uvicorn main:app --host 0.0.0.0 --port 8001 --reload` 로 바꿔라.
    # volumes:
    #   - ./:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/healthz').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
